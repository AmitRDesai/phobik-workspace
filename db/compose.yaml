services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phobik
      PGDATA: /data
    ports:
      - "5433:5432"
    volumes:
      - ./data:/data:delegated

  rustfs:
    image: rustfs/rustfs:latest
    command: --console-enable /data
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./rustfs-data:/data:delegated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rustfs-init:
    image: minio/mc
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://rustfs:9000 rustfsadmin rustfsadmin;
      mc mb --ignore-existing local/phobik-uploads;
      mc anonymous set download local/phobik-uploads;
      "
