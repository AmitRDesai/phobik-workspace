services:
  db:
    image: pgvector/pgvector:0.8.2-pg18
    command: -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phobik
      PGDATA: /data
    ports:
      - "5433:5432"
    volumes:
      - ./data:/data:delegated
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d phobik"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  powersync:
    image: journeyapps/powersync-service:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9100:80"
    volumes:
      - ./powersync.yaml:/powersync.yaml
      - ./sync-config.yaml:/sync-config.yaml
    environment:
      POWERSYNC_CONFIG_PATH: /powersync.yaml
      PS_DB_URI: postgresql://powersync_role:powersync_password@db:5432/phobik
      PS_STORAGE_URI: postgresql://user:postgres@db:5432/phobik
      PS_KID: powersync-key
      PS_JWK_KTY: EC
      PS_JWK_CRV: P-256
      PS_JWK_X: k0IQy_y9RYyTfLTpd-4mJ3QfcXT-cmZrKuEebUgFZjQ
      PS_JWK_Y: 5_Bog74TtWfEVPelDCRbBpVaiHgt_DsaXTRVBTtdDng

  rustfs:
    image: rustfs/rustfs:latest
    command: --console-enable /data
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./rustfs-data:/data:delegated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rustfs-init:
    image: minio/mc
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://rustfs:9000 rustfsadmin rustfsadmin;
      mc mb --ignore-existing local/phobik-uploads;
      mc anonymous set download local/phobik-uploads;
      "
