<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>4-7-8 Breathing Guided Session Refined</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "vibrant-pink": {
                            400: "#fb7185",
                            500: "#f43f5e",
                            600: "#e11d48",
                        },
                        "vibrant-yellow": {
                            400: "#facc15",
                            500: "#eab308",
                        },
                        "obsidian": "#050505",
                        "charcoal-black": "#0a0a0a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at center, #1a0f14 0%, #050505 100%);
        }
        .progress-ring-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        @media (min-height: 800px) {
            .progress-ring-container {
                width: 340px;
                height: 340px;
            }
        }
        .progress-ring-circle {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-pink {
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.5));
        }
        .glow-yellow {
            filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.5));
        }
        .nav-active {
            color: #f43f5e;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-white min-h-screen flex flex-col items-center overflow-hidden pb-[100px]">
<div class="w-full flex items-center p-6 justify-between shrink-0">
<button class="size-11 flex items-center justify-center rounded-full bg-white/5 active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-[11px] font-black tracking-[0.25em] text-vibrant-pink-500 uppercase">4-7-8 Breathing</h1>
<div class="flex items-center gap-1.5 mt-1">
<span class="size-1.5 rounded-full bg-vibrant-yellow-400 shadow-[0_0_10px_#facc15]"></span>
<span class="text-[9px] font-bold text-vibrant-yellow-500/90 tracking-widest uppercase">Biometric Syncing</span>
</div>
</div>
<button class="size-11 flex items-center justify-center rounded-full bg-white/5 active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
<div class="px-8 text-center mt-2 shrink-0">
<h2 class="text-4xl font-light tracking-tight text-white mb-2">Inhale Deeply</h2>
<p class="text-slate-400 text-sm max-w-[280px] mx-auto leading-relaxed">
            Fill your lungs completely with air as the circle expands.
        </p>
</div>
<div class="flex-1 flex items-center justify-center w-full relative min-h-0">
<div class="progress-ring-container flex items-center justify-center">
<div class="absolute inset-8 rounded-full bg-gradient-to-br from-vibrant-pink-500/15 to-vibrant-yellow-500/15 blur-[60px]"></div>
<svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
<circle class="text-white/10" cx="50" cy="50" fill="transparent" r="44" stroke="currentColor" stroke-width="5"></circle>
<circle class="progress-ring-circle" cx="50" cy="50" fill="transparent" r="44" stroke="url(#pinkYellowGradientMain)" stroke-dasharray="276.46" stroke-dashoffset="69" stroke-linecap="round" stroke-width="6"></circle>
<defs>
<linearGradient id="pinkYellowGradientMain" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#f43f5e"></stop>
<stop offset="100%" stop-color="#facc15"></stop>
</linearGradient>
</defs>
</svg>
<div class="z-10 text-center">
<div class="flex flex-col items-center">
<span class="text-7xl font-light tabular-nums tracking-tighter">04</span>
<span class="text-[10px] font-black tracking-[0.4em] text-white/40 uppercase mt-1">Seconds</span>
</div>
</div>
</div>
</div>
<div class="w-full px-6 flex flex-col shrink-0 mt-4">
<div class="glass-card rounded-2xl p-4 text-center mb-6">
<p class="text-[13px] leading-relaxed text-slate-200 font-medium">
                Inhale for 4 seconds, hold your breath for 7 seconds, and exhale for 8 seconds. Repeat this cycle 4 times.
            </p>
</div>
<div class="flex items-center justify-between px-6 mb-8">
<button class="size-14 rounded-full glass-card flex items-center justify-center text-white/60 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">volume_up</span>
</button>
<button class="w-20 h-20 rounded-full bg-gradient-to-br from-vibrant-pink-500 to-vibrant-yellow-500 p-[2px] shadow-[0_0_30px_rgba(244,63,94,0.4)] active:scale-95 transition-all">
<div class="w-full h-full rounded-full bg-black/40 backdrop-blur-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white text-4xl font-light" style="font-variation-settings: 'FILL' 1">pause</span>
</div>
</button>
<button class="size-14 rounded-full glass-card flex items-center justify-center text-white/60 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">replay</span>
</button>
</div>
<div class="grid grid-cols-2 gap-4 mb-4">
<div class="glass-card rounded-[2rem] p-5 flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-vibrant-pink-500 glow-pink" style="font-variation-settings: 'FILL' 1">favorite</span>
<span class="text-[9px] font-bold uppercase tracking-[0.2em] text-white/50">Heart Rate</span>
</div>
<div class="flex items-baseline gap-1 mt-1">
<span class="text-2xl font-semibold tabular-nums">72</span>
<span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">BPM</span>
</div>
</div>
<div class="glass-card rounded-[2rem] p-5 flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-vibrant-yellow-500 glow-yellow" style="font-variation-settings: 'FILL' 1">monitoring</span>
<span class="text-[9px] font-bold uppercase tracking-[0.2em] text-white/50">HRV</span>
</div>
<div class="flex items-baseline gap-1 mt-1">
<span class="text-2xl font-semibold tabular-nums">74</span>
<span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">MS</span>
</div>
</div>
</div>
</div>
<nav class="fixed bottom-0 left-0 right-0 h-[84px] bg-black/80 backdrop-blur-2xl border-t border-white/5 flex items-start justify-around px-2 pt-3 z-50">
<button class="flex flex-col items-center gap-1 w-16">
<span class="material-symbols-outlined text-slate-500">calendar_today</span>
<span class="text-[10px] font-medium text-slate-500 uppercase tracking-tighter">Today</span>
</button>
<button class="flex flex-col items-center gap-1 w-16 nav-active">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">self_improvement</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Practices</span>
</button>
<button class="flex flex-col items-center gap-1 w-16">
<span class="material-symbols-outlined text-slate-500">auto_awesome</span>
<span class="text-[10px] font-medium text-slate-500 uppercase tracking-tighter">Coach</span>
</button>
<button class="flex flex-col items-center gap-1 w-16">
<span class="material-symbols-outlined text-slate-500">groups</span>
<span class="text-[10px] font-medium text-slate-500 uppercase tracking-tighter">Community</span>
</button>
<button class="flex flex-col items-center gap-1 w-16">
<span class="material-symbols-outlined text-slate-500">bar_chart</span>
<span class="text-[10px] font-medium text-slate-500 uppercase tracking-tighter">Insights</span>
</button>
</nav>

</body></html>
