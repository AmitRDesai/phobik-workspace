<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Star Breathing Guided Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "vibrant-pink": {
                            50: "#fdf2f8",
                            100: "#fce7f3",
                            200: "#fbcfe8",
                            300: "#f9a8d4",
                            400: "#f472b6",
                            500: "#ec4899",
                            600: "#db2777",
                            900: "#831843",
                        },
                        "warm-yellow": {
                            50: "#fffbeb",
                            100: "#fef3c7",
                            200: "#fde68a",
                            300: "#fcd34d",
                            400: "#fbbf24",
                            500: "#f59e0b",
                            900: "#78350f",
                        },
                        "background-charcoal": "#0a0a0c",
                        "obsidian": "#050505",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .star-path {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .star-glow-container {
            filter: drop-shadow(0 0 15px rgba(236, 72, 153, 0.4)) drop-shadow(0 0 30px rgba(245, 158, 11, 0.2));
        }
        .breathing-orb {
            fill: #ffffff;
            filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 15px rgba(236, 72, 153, 0.8));
        }
        .progress-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-fill {
            width: 38%;
            height: 100%;
            background: linear-gradient(90deg, #ec4899, #f59e0b);
            border-radius: 99px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-blur {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-obsidian min-h-screen flex flex-col font-display selection:bg-vibrant-pink-500/30">
<header class="px-6 pt-14 pb-4 w-full max-w-md mx-auto z-20">
<div class="flex items-center justify-between mb-6">
<button class="size-11 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white/70">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/40 mb-1">Star Breathing</span>
<span class="text-xl font-medium tabular-nums text-white">01:42</span>
</div>
<button class="size-11 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white/70 text-[22px]">settings</span>
</button>
</div>
<div class="progress-track">
<div class="progress-fill"></div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-start relative px-8 pt-4">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] aspect-square bg-vibrant-pink-600/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 aspect-square bg-warm-yellow-500/5 blur-[100px] rounded-full pointer-events-none"></div>
<div class="text-center mb-6 z-10">
<h1 class="text-5xl font-semibold tracking-tight mb-3 text-white">Breathe in</h1>
<p class="text-white/40 text-sm font-medium">Follow the light around the star</p>
</div>
<div class="relative w-full max-w-[320px] aspect-square flex items-center justify-center z-10">
<svg class="w-full h-full star-glow-container" viewBox="0 0 200 200">
<defs>
<linearGradient id="starGradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" style="stop-color:#ec4899;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"></stop>
</linearGradient>
</defs>
<path class="star-path opacity-10" d="M100,20 L126,80 L190,80 L138,118 L158,180 L100,142 L42,180 L62,118 L10,80 L74,80 Z" stroke="#ffffff"></path>
<path class="star-path" d="M100,20 L126,80 L190,80 L138,118 L158,180 L100,142 L42,180 L62,118 L10,80 L74,80 Z" stroke="url(#starGradient)"></path>
<circle class="breathing-orb" cx="100" cy="20" r="5"></circle>
<circle cx="100" cy="100" fill="none" opacity="0.05" r="45" stroke="white" stroke-width="0.5"></circle>
<circle cx="100" cy="100" fill="none" opacity="0.03" r="55" stroke="white" stroke-width="0.5"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<div class="text-center">
<div class="flex items-center justify-center gap-1 mb-0.5">
<span class="material-symbols-outlined text-vibrant-pink-500 text-sm fill">favorite</span>
<span class="text-3xl font-bold tracking-tight text-white tabular-nums">72</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-white/30">BPM</span>
</div>
</div>
</div>
</main>
<footer class="w-full max-w-md mx-auto z-20">
<div class="px-6 space-y-4 mb-6">
<div class="glass-card rounded-2xl p-4 text-center border-white/10 shadow-lg">
<p class="text-[15px] leading-relaxed text-white/90 font-medium">
                Trace the stars edges with your breath. Inhale and exhale along the lines, hold at each point.
            </p>
</div>
<div class="glass-card rounded-[32px] p-6">
<div class="flex justify-between items-center mb-6">
<div class="flex items-center gap-4">
<div class="size-12 rounded-2xl bg-gradient-to-br from-vibrant-pink-500/20 to-warm-yellow-500/20 flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-vibrant-pink-400 fill">favorite</span>
</div>
<div>
<p class="text-[10px] font-bold uppercase tracking-widest text-white/30 mb-0.5">Heart Rate Variability</p>
<div class="flex items-baseline gap-2">
<span class="text-lg font-semibold text-white">64ms</span>
<span class="text-emerald-400 text-xs font-bold flex items-center">
<span class="material-symbols-outlined text-[14px] font-bold">arrow_upward</span>
                                12%
                            </span>
</div>
</div>
</div>
<div class="h-10 flex items-end gap-1.5 pr-2">
<div class="w-1.5 bg-vibrant-pink-500/20 h-2/5 rounded-full"></div>
<div class="w-1.5 bg-vibrant-pink-500/40 h-3/5 rounded-full"></div>
<div class="w-1.5 bg-vibrant-pink-500 h-full rounded-full shadow-[0_0_8px_rgba(236,72,153,0.4)]"></div>
<div class="w-1.5 bg-warm-yellow-500 h-4/5 rounded-full"></div>
<div class="w-1.5 bg-warm-yellow-500/40 h-3/5 rounded-full"></div>
<div class="w-1.5 bg-warm-yellow-500/20 h-2/5 rounded-full"></div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white/[0.04] rounded-2xl p-4 border border-white/5">
<p class="text-[10px] font-bold uppercase tracking-widest text-warm-yellow-400/50 mb-1.5">Stress Level</p>
<div class="flex items-center gap-2">
<div class="size-2 bg-emerald-400 rounded-full"></div>
<p class="text-sm font-semibold text-white">Low</p>
</div>
</div>
<div class="bg-white/[0.04] rounded-2xl p-4 border border-white/5">
<p class="text-[10px] font-bold uppercase tracking-widest text-vibrant-pink-300/50 mb-1.5">Sync Status</p>
<div class="flex items-center gap-2">
<div class="size-2 bg-emerald-400 rounded-full shadow-[0_0_8px_#34d399]"></div>
<p class="text-sm font-semibold text-white">Live Tracking</p>
</div>
</div>
</div>
</div>
</div>
<nav class="nav-blur px-6 pt-4 pb-8 flex items-center justify-between">
<button class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined text-[24px]">calendar_today</span>
<span class="text-[10px] font-medium">Today</span>
</button>
<button class="flex flex-col items-center gap-1 text-vibrant-pink-500">
<span class="material-symbols-outlined text-[24px] fill">self_improvement</span>
<span class="text-[10px] font-medium">Practices</span>
</button>
<button class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined text-[24px]">psychology</span>
<span class="text-[10px] font-medium">Coach</span>
</button>
<button class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined text-[24px]">groups</span>
<span class="text-[10px] font-medium">Community</span>
</button>
<button class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined text-[24px]">insights</span>
<span class="text-[10px] font-medium">Insights</span>
</button>
</nav>
</footer>

</body></html>
