<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4256a",
                        "accent-yellow": "#facc15",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-gradient: linear-gradient(135deg, #f4256a, #facc15);
        }
        .gradient-text {
            background: linear-gradient(to right, #f4256a, #facc15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-glow-btn {
            background: var(--primary-gradient);
            box-shadow: 0 10px 30px rgba(244, 37, 106, 0.4);
        }
        .mandala-glow {
            filter: drop-shadow(0 0 40px rgba(244, 37, 106, 0.6));
        }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .energy-card {
            @apply bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-center gap-2 transition-all duration-300;
        }
        .energy-card.selected {
            background: rgba(244, 37, 106, 0.1);
            border-color: transparent;
            position: relative;
        }
        .energy-card.selected::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1rem;
            padding: 1px;
            background: var(--primary-gradient);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            box-shadow: 0 0 15px rgba(244, 37, 106, 0.5);
        }
        body {
            min-height: 100dvh;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-dark font-display text-white flex flex-col max-w-md mx-auto relative border-x border-white/5 overflow-y-auto">
<div class="fixed inset-0 pointer-events-none overflow-hidden opacity-80 z-0">
<div class="confetti-piece bg-primary" style="top: 10%; left: 20%; transform: rotate(45deg);"></div>
<div class="confetti-piece bg-accent-yellow" style="top: 15%; right: 25%; transform: rotate(15deg);"></div>
<div class="confetti-piece bg-white" style="top: 30%; left: 10%; transform: rotate(-20deg);"></div>
<div class="confetti-piece bg-primary" style="top: 40%; right: 15%; transform: rotate(60deg);"></div>
<div class="confetti-piece bg-accent-yellow" style="top: 5%; right: 50%; transform: rotate(110deg);"></div>
<div class="confetti-piece bg-white" style="bottom: 40%; left: 20%; transform: rotate(30deg);"></div>
<div class="confetti-piece bg-primary" style="bottom: 25%; right: 30%; transform: rotate(-45deg);"></div>
<div class="confetti-piece bg-accent-yellow" style="bottom: 50%; left: 5%; transform: rotate(80deg);"></div>
<div class="confetti-piece bg-primary" style="top: 60%; left: 40%; transform: rotate(10deg);"></div>
<div class="confetti-piece bg-accent-yellow" style="top: 20%; left: 60%; transform: rotate(95deg);"></div>
<div class="confetti-piece bg-white" style="bottom: 60%; right: 10%; transform: rotate(150deg);"></div>
</div>
<div class="flex items-center p-6 justify-end relative z-10">
<div class="text-white/40 flex size-10 items-center justify-center rounded-full bg-white/5">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
</div>
<div class="flex-1 flex flex-col items-center px-6 text-center relative z-10 pt-4">
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="mandala-glow relative flex items-center justify-center">
<div class="size-36 rounded-full border-[10px] border-primary/20 flex items-center justify-center">
<div class="size-28 rounded-full border-[6px] border-primary/40 flex items-center justify-center">
<div class="size-20 rounded-full bg-gradient-to-br from-primary to-accent-yellow flex items-center justify-center">
<span class="material-symbols-outlined text-white text-4xl fill-1">check_circle</span>
</div>
</div>
</div>
<div class="absolute inset-0 border-2 border-dashed border-white/20 rounded-full scale-125"></div>
</div>
</div>
<div class="space-y-3 mb-8">
<h1 class="text-white text-3xl font-black leading-tight tracking-tighter uppercase">
                PRACTICE<br/>COMPLETED!
            </h1>
<p class="text-white/60 text-sm font-medium max-w-[280px] mx-auto">
                You've successfully completed a mindfulness session.
            </p>
</div>
<div class="w-full space-y-6 mb-12">
<h2 class="text-white/60 text-xs font-bold tracking-[0.2em] uppercase">Daily D.O.S.E. Rewards</h2>
<div class="flex justify-center gap-6">
<div class="flex flex-col items-center gap-3">
<div class="size-16 rounded-full bg-gradient-to-br from-primary to-[#ff4b8b] flex items-center justify-center shadow-[0_0_20px_rgba(244,37,106,0.5)] relative group">
<span class="material-symbols-outlined text-white text-3xl fill-1">toll</span>
<div class="absolute inset-0 rounded-full animate-pulse bg-primary/20 scale-125"></div>
</div>
<div class="text-center">
<p class="text-white font-black text-xl">+10</p>
<p class="text-primary text-[10px] font-bold uppercase tracking-widest">Endorphins</p>
</div>
</div>
<div class="flex flex-col items-center gap-3">
<div class="size-16 rounded-full bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.5)] relative group">
<span class="material-symbols-outlined text-white text-3xl fill-1">toll</span>
<div class="absolute inset-0 rounded-full animate-pulse bg-blue-500/20 scale-125"></div>
</div>
<div class="text-center">
<p class="text-white font-black text-xl">+5</p>
<p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Serotonin</p>
</div>
</div>
</div>
</div>
</div>
<div class="px-8 pb-8 flex flex-col gap-4 relative z-10">
<button class="w-full py-5 rounded-2xl gradient-glow-btn text-black text-lg font-bold transition-transform active:scale-95">Collect Rewards &amp; Finish</button>
<button class="w-full py-4 flex items-center justify-center gap-2 text-white/70 text-sm font-semibold hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">ios_share</span>
            Share Victory
        </button>
</div>
<div class="h-6 w-full flex justify-center items-end pb-2 shrink-0">
<div class="w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</body></html>
