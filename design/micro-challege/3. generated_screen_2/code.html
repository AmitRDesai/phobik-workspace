<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PHOBIK - Floating Feelings Mapper</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'phobik-pink': '#FF3366',
            'phobik-yellow': '#FFCC00',
          },
          backgroundImage: {
            'phobik-gradient': 'linear-gradient(to right, #FF3366, #FFCC00)',
          }
        }
      }
    }
  </script>
<!-- Custom Styles for UI Polish -->
<style data-purpose="background-and-effects">
    body {
      background-color: #000000;
      overflow: hidden; /* Prevent scrolling for the mapper experience */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    .glow-overlay {
      background: radial-gradient(circle at center, rgba(255, 51, 102, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Animation for floating spheres */
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .floating {
      animation: float 6s ease-in-out infinite;
    }

    .orbit-animation {
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
<style data-purpose="emotion-gradients">
    .grad-happy { background: radial-gradient(circle, #FDE047, #EAB308); box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
    .grad-peaceful { background: radial-gradient(circle, #86EFAC, #22C55E); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
    .grad-energized { background: radial-gradient(circle, #FDBA74, #F97316); box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
    .grad-loving { background: radial-gradient(circle, #FDA4AF, #F43F5E); box-shadow: 0 0 20px rgba(244, 63, 94, 0.4); }
    .grad-confident { background: radial-gradient(circle, #93C5FD, #3B82F6); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    .grad-sad { background: radial-gradient(circle, #60A5FA, #1D4ED8); box-shadow: 0 0 20px rgba(29, 78, 216, 0.4); }
    .grad-angry { background: radial-gradient(circle, #F87171, #B91C1C); box-shadow: 0 0 20px rgba(185, 28, 28, 0.4); }
    .grad-afraid { background: radial-gradient(circle, #D8B4FE, #7E22CE); box-shadow: 0 0 20px rgba(126, 34, 206, 0.4); }
    .grad-ashamed { background: radial-gradient(circle, #94A3B8, #475569); box-shadow: 0 0 20px rgba(71, 85, 105, 0.4); }
    .grad-overwhelmed { background: radial-gradient(circle, #C084FC, #9333EA); box-shadow: 0 0 20px rgba(147, 51, 234, 0.4); }
    .grad-disconnected { background: radial-gradient(circle, #CBD5E1, #64748B); box-shadow: 0 0 20px rgba(100, 116, 139, 0.4); }
  </style>
</head>
<body class="flex flex-col h-screen text-white select-none"><!-- BEGIN: Step Progress Bar -->
<div class="px-6 pt-6 pb-2 w-full flex gap-1.5 z-[60] relative" data-purpose="step-progress-bar">
<div class="h-1 flex-1 rounded-full bg-phobik-gradient"></div>
<div class="h-1 flex-1 rounded-full bg-phobik-gradient"></div>
<div class="h-1 flex-1 rounded-full bg-phobik-gradient"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
<div class="h-1 flex-1 rounded-full bg-white/20"></div>
</div>
<!-- END: Step Progress Bar -->
<!-- BEGIN: Header -->
<header class="pb-4 px-6 relative z-50 text-center pt-4">
<h1 class="text-sm uppercase tracking-widest text-gray-400 font-semibold mb-2" style="">Floating Feelings Mapper</h1>
<p class="text-lg font-light text-gray-200" style="">Name the feelings without judgment.  <div>I feel...</div></p>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Canvas Area -->
<main class="flex-grow relative overflow-hidden" data-purpose="emotion-mapper-canvas">
<!-- Luminous background particles (Decorative) -->
<div class="absolute inset-0 glow-overlay"></div>
<!-- Particles simulation layer -->
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-white rounded-full opacity-20 blur-sm"></div>
<div class="absolute top-1/2 left-3/4 w-1 h-1 bg-phobik-pink rounded-full opacity-30 blur-sm"></div>
<div class="absolute bottom-1/4 left-1/2 w-1.5 h-1.5 bg-phobik-yellow rounded-full opacity-20 blur-sm"></div>
<!-- BEGIN: Floating Spheres Container -->
<div class="relative w-full h-full flex items-center justify-center">
<!-- Expanded Category: Happy -->
<div class="relative flex items-center justify-center z-40">
<!-- Orbits for sub-feelings -->
<div class="absolute w-64 h-64 border border-white/10 rounded-full orbit-animation">
<!-- Sub-feeling: Joyful -->
<div class="absolute -top-4 left-1/2 -translate-x-1/2 flex flex-col items-center">
<div class="w-2 h-2 bg-white rounded-full shadow-[0_0_10px_white]"></div>
<div class="w-[1px] h-8 bg-gradient-to-b from-white/40 to-transparent"></div>
<span class="text-[10px] uppercase tracking-tighter text-white/80 mt-1" style="">Joyful</span>
</div>
<!-- Sub-feeling: Radiant -->
<div class="absolute top-1/2 -right-4 -translate-y-1/2 flex items-center">
<span class="text-[10px] uppercase tracking-tighter text-white/80 mr-1" style="">Radiant</span>
<div class="w-[1px] h-1 w-8 bg-gradient-to-l from-white/40 to-transparent"></div>
<div class="w-2 h-2 bg-white rounded-full shadow-[0_0_10px_white]"></div>
</div>
</div>
<!-- Main Sphere -->
<div class="w-32 h-32 rounded-full grad-happy flex items-center justify-center text-black font-bold text-sm shadow-2xl relative" style="">
          HAPPY
          <!-- Pulse Ring -->
<div class="absolute inset-0 rounded-full border border-white/30 animate-ping opacity-20"></div>
</div>
</div>
<!-- Other Primary Spheres (Scattered background states) -->
<div class="absolute top-10 left-10 w-16 h-16 rounded-full grad-peaceful opacity-60 floating blur-[1px] flex items-center justify-center text-[8px] text-white font-bold" style="">PEACEFUL</div>
<div class="absolute top-20 right-12 w-14 h-14 rounded-full grad-energized opacity-40 floating blur-[2px] flex items-center justify-center text-[8px] text-white font-bold" style="">ENERGIZED</div>
<div class="absolute bottom-40 left-8 w-18 h-18 rounded-full grad-sad opacity-50 floating blur-[1px] flex items-center justify-center text-[8px] text-white font-bold" style="">SAD</div>
<div class="absolute bottom-24 right-16 w-16 h-16 rounded-full grad-angry opacity-40 floating blur-[1px] flex items-center justify-center text-[8px] text-white font-bold" style="">ANGRY</div>
<div class="absolute top-1/2 -left-4 w-12 h-12 rounded-full grad-afraid opacity-30 floating blur-[3px] flex items-center justify-center text-[8px] text-white font-bold" style="">AFRAID</div>
<div class="absolute top-1/3 -right-6 w-14 h-14 rounded-full grad-loving opacity-60 floating flex items-center justify-center text-[8px] text-white font-bold" style="">LOVING</div>
<div class="absolute bottom-10 left-1/3 w-12 h-12 rounded-full grad-ashamed opacity-20 floating blur-[4px]"></div>
<div class="absolute top-1/4 left-1/2 w-10 h-10 rounded-full grad-confident opacity-40 floating blur-[2px]"></div>
</div>
<!-- END: Floating Spheres Container -->
</main>
<!-- END: Main Canvas Area -->
<!-- BEGIN: Bottom Interaction Area -->
<section class="px-6 pb-24 relative z-50">
<button class="w-full py-4 rounded-full bg-phobik-gradient text-white font-bold text-lg shadow-lg active:scale-95 transition-transform" data-purpose="primary-action" style="">
      Confirm Feeling
    </button>
</section>
<!-- END: Bottom Interaction Area -->
<!-- BEGIN: Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-md border-t border-white/10 px-6 py-4 flex justify-between items-center z-[100]" data-purpose="bottom-nav">
<div class="flex flex-col items-center opacity-100">
<svg class="w-6 h-6 text-phobik-pink" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-[10px] mt-1 text-phobik-pink" style="">Today</span>
</div>
<div class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-[10px] mt-1 text-white" style="">Practices</span>
</div>
<div class="flex flex-col items-center opacity-50">
<div class="w-6 h-6 rounded-full border-2 border-white flex items-center justify-center">
<div class="w-2 h-2 bg-white rounded-full"></div>
</div>
<span class="text-[10px] mt-1 text-white" style="">Coach</span>
</div>
<div class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-[10px] mt-1 text-white" style="">Community</span>
</div>
<div class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<span class="text-[10px] mt-1 text-white" style="">Insights</span>
</div>
</nav>
<!-- END: Navigation Bar -->
</body></html>
