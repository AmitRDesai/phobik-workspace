<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PHOBIK - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-sunset": "#FF4D8D",
                        "accent-yellow": "#FFD541",
                        "charcoal-dark": "#0A0A0A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .radiant-aura {
                background: radial-gradient(circle at center, rgba(255, 77, 141, 0.25) 0%, rgba(255, 213, 65, 0.1) 50%, transparent 80%);
            }
            .sunset-gradient {
                background: linear-gradient(135deg, #FF4D8D 0%, #FF8D5C 45%, #FFD541 100%);
            }
            .sunset-text-gradient {
                background: linear-gradient(135deg, #FF4D8D 0%, #FFD541 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
            background-color: #0A0A0A;
        }
    </style>
<style>
