<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PHOBIK - Specific Fear Triggers</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-sunset": "#FF4D8D",
                        "accent-yellow": "#FFD541",
                        "charcoal-dark": "#0A0A0A",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .radiant-aura {
                background: radial-gradient(circle at top right, rgba(255, 77, 141, 0.12) 0%, rgba(255, 213, 65, 0.05) 40%, transparent 70%);
            }
            .sunset-gradient {
                background: linear-gradient(135deg, #FF4D8D 0%, #FF8D5C 45%, #FFD541 100%);
            }
            .sunset-glow {
                box-shadow: 0 0 15px rgba(255, 77, 141, 0.4), 0 0 5px rgba(255, 213, 65, 0.2);
            }
            .card-selected {
                @apply border-primary-sunset bg-white/10 sunset-glow;
            }
            .card-unselected {
                @apply border-white/10 bg-white/5 hover:bg-white/10;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-display text-white bg-charcoal-dark antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col max-w-md mx-auto bg-charcoal-dark overflow-hidden">

<header class="w-full px-6 pt-12 shrink-0">
<div class="flex w-full flex-row items-center justify-center gap-1.5">

<div class="h-1.5 flex-1 rounded-full sunset-gradient"></div>
<div class="h-1.5 flex-1 rounded-full sunset-gradient shadow-[0_0_12px_rgba(255,77,141,0.5)]"></div>
<div class="h-1.5 flex-1 rounded-full bg-white/10"></div>
<div class="h-1.5 flex-1 rounded-full bg-white/10"></div>
<div class="h-1.5 flex-1 rounded-full bg-white/10"></div>
<div class="h-1.5 flex-1 rounded-full bg-white/10"></div>
<div class="h-1.5 flex-1 rounded-full bg-white/10"></div>
</div>
<div class="mt-6 flex justify-between items-center">
<span class="text-xs font-bold tracking-widest uppercase text-white/40">Step 3 of 8</span>
</div>
</header>
<div class="px-6 pt-6 shrink-0">
<h1 class="text-2xl font-extrabold tracking-tight leading-tight">
                Are there specific situations that spike anxiety for you?
            </h1>
<p class="text-white/50 text-sm mt-2 mb-6">Personalize your nervous system support.</p>
<div class="relative mb-4">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-[20px]">search</span>
<input class="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 pl-11 pr-4 text-white placeholder:text-white/30 focus:outline-none focus:border-primary-sunset/50 transition-all text-sm" placeholder="Search triggers..." type="text"/>
</div>
</div>

<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-start justify-between p-4 min-h-[100px] rounded-2xl border-2 transition-all card-selected">
<span class="material-symbols-outlined text-primary-sunset text-[28px] mb-2">bug_report</span>
<span class="font-bold text-[14px] leading-tight text-left">Fear of Spiders</span>
</button>
<button class="flex flex-col items-start justify-between p-4 min-h-[100px] rounded-2xl border transition-all card-unselected">
<span class="material-symbols-outlined text-white/30 text-[28px] mb-2">landscape</span>
<span class="font-bold text-[14px] leading-tight text-left text-white/90">Fear of Heights</span>
</button>

</button>

<span class="font-bold text-[14px] leading-tight text-left text-white/90">Fear of Dentist</span>
</button>
<button class="flex flex-col items-start justify-between p-4 min-h-[100px] rounded-2xl border transition-all card-unselected">
<span class="material-symbols-outlined text-white/30 text-[28px] mb-2">record_voice_over</span>
<span class="font-bold text-[14px] leading-tight text-left text-white/90">Fear of Public Speaking</span>
</button>
<button class="flex flex-col items-start justify-between p-4 min-h-[100px] rounded-2xl border transition-all card-unselected">
<span class="material-symbols-outlined text-white/30 text-[28px] mb-2">groups</span>
<span class="font-bold text-[14px] leading-tight text-left text-white/90">Fear of Crowds</span>
</button>
<button class="flex flex-col items-start justify-between p-4 min-h-[100px] rounded-2xl border transition-all card-unselected">
<span class="material-symbols-outlined text-white/30 text-[28px] mb-2">vaccines</span>
<span class="font-bold text-[14px] leading-tight text-left text-white/90">Fear of Needles</span>
</button>

<span class="font-bold text-[14px] leading-tight text-left text-white/90">Fear of Dogs</span>
</button>
<div class="col-span-2 mt-2">
<div class="relative">
<input class="w-full bg-white/5 border border-white/10 rounded-2xl py-4.5 px-4 text-white placeholder:text-white/30 focus:outline-none focus:border-white/30 text-sm" placeholder="Other (type here...)" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white/20">edit_note</span>
</div>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gradient-to-t from-charcoal-dark via-charcoal-dark/95 to-transparent px-6 pb-10 pt-10 z-30">
<button class="sunset-gradient flex w-full items-center justify-center rounded-full h-16 text-charcoal-dark text-lg font-bold shadow-2xl shadow-primary-sunset/20 transition-all active:scale-[0.97]">
<span>Continue</span>
</button>
</footer>
</div>
