<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Affirmation Generated &amp; Practice Plan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF4D94",
                        "accent": "#FFD700",
                        "obsidian": "#050505",
                        "dust": "#2D1B33",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-gradient: linear-gradient(135deg, #FF4D94 0%, #FFD700 100%);
        }
        body {
            background-color: #050505;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .celestial-bg {
            background: radial-gradient(circle at top center, #1A0F1F 0%, #050505 100%);
            position: relative;
        }
        .celestial-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.15;
            pointer-events: none;
        }
        .ios-blur {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        .radiant-button {
            background: var(--primary-gradient);
            box-shadow: 0 4px 25px rgba(255, 77, 148, 0.4);
        }
        .affirmation-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 2px;
            overflow: hidden;
        }
        .affirmation-card::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1.5px;
            border-radius: 24px;
            background: var(--primary-gradient);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .glow-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255, 77, 148, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .practice-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .practice-card:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 77, 148, 0.3);
            box-shadow: 0 0 15px rgba(255, 77, 148, 0.1);
        }
        .practice-card.selected {
            background: rgba(255, 77, 148, 0.1);
            border-color: rgba(255, 77, 148, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="celestial-bg flex flex-col min-h-screen">
<header class="pt-14 px-6 pb-2 flex items-center justify-between z-20">
<button class="text-white/60">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<div class="flex gap-1.5">
<div class="h-1 w-6 rounded-full bg-primary/40"></div>
<div class="h-1 w-6 rounded-full bg-primary/40"></div>
<div class="h-1 w-6 rounded-full bg-primary"></div>
</div>
<div class="w-6"></div>
</header>
<main class="flex-1 flex flex-col px-6 pb-48 pt-4">
<section class="mb-8 relative">
<div class="glow-overlay"></div>
<div class="affirmation-card">
<div class="bg-[#0A0A0A]/90 rounded-[22px] px-8 py-10 text-center"><button class="absolute top-4 right-4 text-white/40 hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">sync</span>
</button>
<span class="material-symbols-outlined text-primary/40 mb-4 scale-125">auto_awesome</span>
<h2 class="text-xl md:text-2xl font-light leading-relaxed text-white">
                        “I choose to step forward with <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-accent font-medium">courage</span> and trust my inner strength.”
                    </h2>
</div>
</div>
</section><section class="mt-4">
<p class="text-white/70 text-base leading-relaxed text-center px-4">
        Your affirmation works best when you practice it regularly. Repeat it during challenging moments to help guide your thoughts and reactions.
    </p>
</section>


</main>
<div class="fixed bottom-0 left-0 right-0 z-50">
<div class="max-w-md mx-auto px-6 pb-6">
<button class="radiant-button w-full py-5 rounded-2xl text-white font-bold text-lg tracking-wider uppercase shadow-2xl active:scale-[0.98] transition-transform">Save to Today Dashboard</button>
</div>
<nav class="bg-obsidian/80 ios-blur border-t border-white/5 px-4 pt-3 pb-8">
<div class="max-w-md mx-auto flex justify-between items-center px-2">
<button class="flex flex-col items-center gap-1 min-w-[64px] text-primary">
<span class="material-symbols-outlined fill-1">calendar_today</span>
<span class="text-[10px] font-bold">Today</span>
</button>
<button class="flex flex-col items-center gap-1 min-w-[64px] text-white/40">
<span class="material-symbols-outlined">self_improvement</span>
<span class="text-[10px] font-medium">Practices</span>
</button>
<button class="flex flex-col items-center gap-1 min-w-[64px] text-white/40">
<span class="material-symbols-outlined">psychology</span>
<span class="text-[10px] font-medium">Coach</span>
</button>
<button class="flex flex-col items-center gap-1 min-w-[64px] text-white/40">
<span class="material-symbols-outlined">groups</span>
<span class="text-[10px] font-medium">Community</span>
</button>
<button class="flex flex-col items-center gap-1 min-w-[64px] text-white/40">
<span class="material-symbols-outlined">insights</span>
<span class="text-[10px] font-medium">Insights</span>
</button>
</div>
</nav>
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/10 rounded-full"></div>
</div>
</body></html>
