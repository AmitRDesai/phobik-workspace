<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PHOBIK - Quick Reset</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Premium Feel -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'phobik-pink': '#FF3366',
            'phobik-yellow': '#FFCC00',
            'dark-surface': '#121212',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-gradients">
    /* Signature PHOBIK Sunset Gradient for Borders and Buttons */
    .phobik-gradient-bg {
      background: linear-gradient(90deg, #FF3366 0%, #FFCC00 100%);
    }
    
    .phobik-gradient-border {
      position: relative;
      background: #000;
      background-clip: padding-box;
      border: 2px solid transparent;
    }
    
    .phobik-gradient-border::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      z-index: -1;
      margin: -2px;
      border-radius: inherit;
      background: linear-gradient(90deg, #FF3366 0%, #FFCC00 100%);
    }

    .active-tab-indicator {
      height: 2px;
      width: 20px;
      background: linear-gradient(90deg, #FF3366 0%, #FFCC00 100%);
      margin-top: 4px;
    }
  </style>
</head>
<body class="bg-black text-white font-sans flex flex-col min-h-screen">
<!-- BEGIN: Header -->
<header class="pt-12 pb-6 px-6" data-purpose="main-header">
<div class="flex justify-between items-center">
<button class="text-white/70 hover:text-white">
<!-- Back Icon -->
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15.75 19.5L8.25 12l7.5-7.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<h1 class="text-xl font-bold tracking-tight uppercase">Quick Reset</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<main class="flex-grow px-6 flex flex-col" data-purpose="content-area">
<!-- Prompt Section -->
<section class="mt-4 mb-8" data-purpose="reflection-prompt">
<h2 class="text-2xl font-semibold leading-tight text-white/90">
        What happened? <br/>
<span class="text-white/60 font-normal">What is really happening right now?</span>
</h2>
</section>
<!-- Input Section -->
<section class="flex-grow flex flex-col gap-6" data-purpose="reflection-input-container">
<div class="relative flex-grow phobik-gradient-border rounded-2xl overflow-hidden min-h-[300px]">
<textarea class="w-full h-full bg-black border-none text-lg text-white/90 p-6 focus:ring-0 placeholder-white/20 resize-none" data-purpose="user-reflection-textarea" placeholder="Type your reflection here..."></textarea>
<!-- Dictation Button -->
<button class="absolute bottom-4 right-4 p-3 rounded-full bg-white/10 hover:bg-white/20 transition-colors" data-purpose="dictation-trigger">
<svg class="w-6 h-6 text-phobik-pink" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
<!-- Action Button -->
<button class="phobik-gradient-bg w-full py-4 rounded-xl font-bold text-black uppercase tracking-widest shadow-lg active:scale-[0.98] transition-transform" data-purpose="submit-button">
        Get AI Support
      </button>
</section>
<!-- Support Context Footer -->
<div class="mt-8 text-center" data-purpose="support-context">
<p class="text-xs text-white/40 italic">Sharing your thoughts helps us guide you back to calm.</p>
</div>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Navigation Bar -->
<nav class="bg-black border-t border-white/10 pb-8 pt-4 px-2" data-purpose="bottom-navigation">
<ul class="flex justify-around items-center"><li class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 mb-1 text-white" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[10px] font-bold tracking-tighter uppercase">Today</span>
</li>
<li class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 mb-1 text-white" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0A9 9 0 115.636 5.636a9 9 0 0112.728 12.728z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[10px] font-bold tracking-tighter uppercase">Practices</span>
</li>
<li class="flex flex-col items-center opacity-100">
<svg class="w-6 h-6 mb-1 text-phobik-pink" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[10px] font-bold tracking-tighter uppercase">Coach</span>
<div class="active-tab-indicator"></div>
</li>
<li class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 mb-1 text-white" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[10px] font-bold tracking-tighter uppercase">Community</span>
</li>
<li class="flex flex-col items-center opacity-50">
<svg class="w-6 h-6 mb-1 text-white" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[10px] font-bold tracking-tighter uppercase">Insights</span>
</li></ul>
</nav>
<!-- END: Navigation Bar -->
</body></html>
