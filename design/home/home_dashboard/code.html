<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF4D94",
                        "accent": "#FFD700",
                        "obsidian": "#050505",
                        "dust": "#2D1B33",

                        "sans": ["Inter", "sans-serif"]
                    }

        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-gradient: linear-gradient(135deg, #FF4D94 0%, #FFD700 100%);
        }
        body {
            background-color: #050505;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        .celestial-bg {
            background: radial-gradient(circle at center, #1A0F1F 0%, #050505 100%);
            position: relative;
        }
        .celestial-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.1;
        }
        .ios-blur {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
        .radiant-button {
            background: var(--primary-gradient);
            box-shadow: 0 4px 25px rgba(255, 77, 148, 0.4);
        }
        .compass-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }
        .core-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
        }
        .node {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .node-selected {
            background: rgba(255, 255, 255, 0.1);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.6);
            position: relative;
        }
        .node-selected::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: var(--primary-gradient);
            z-index: -1;
        }
        .energy-line {
            position: absolute;
            top: 50%;
            left: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 77, 148, 0.8), transparent);
            transform-origin: left center;
            z-index: 1;
            width: 120px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .energy-line-active {
            opacity: 1;
        }.pos-0 { transform: translate(-50%, -50%) rotate(0deg) translateY(-120px) rotate(0deg); }
        .pos-1 { transform: translate(-50%, -50%) rotate(45deg) translateY(-120px) rotate(-45deg); }
        .pos-2 { transform: translate(-50%, -50%) rotate(90deg) translateY(-120px) rotate(-90deg); }
        .pos-3 { transform: translate(-50%, -50%) rotate(135deg) translateY(-120px) rotate(-135deg); }
        .pos-4 { transform: translate(-50%, -50%) rotate(180deg) translateY(-120px) rotate(-180deg); }
        .pos-5 { transform: translate(-50%, -50%) rotate(225deg) translateY(-120px) rotate(-225deg); }
        .pos-6 { transform: translate(-50%, -50%) rotate(270deg) translateY(-120px) rotate(-270deg); }
        .pos-7 { transform: translate(-50%, -50%) rotate(315deg) translateY(-120px) rotate(-315deg); }.line-0 { transform: translateY(-50%) rotate(-90deg); }
        .line-1 { transform: translateY(-50%) rotate(-45deg); }
        .line-2 { transform: translateY(-50%) rotate(0deg); }
        .line-3 { transform: translateY(-50%) rotate(45deg); }
        .line-4 { transform: translateY(-50%) rotate(90deg); }
        .line-5 { transform: translateY(-50%) rotate(135deg); }
        .line-6 { transform: translateY(-50%) rotate(180deg); }
        .line-7 { transform: translateY(-50%) rotate(225deg); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

            Continue

</button>
<button class="flex flex-col items-center gap-1 min-w-[64px] text-white/40">
